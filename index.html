<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Decide App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #06060e;
            --surface: rgba(255, 255, 255, 0.04);
            --surface2: rgba(255, 255, 255, 0.08);
            --blue: #4DFFFF;
            --purple: #B47FFF;
            --green: #39FF96;
            --text: #F0F0FF;
            --text-dim: rgba(240, 240, 255, 0.25);
            --border: rgba(255, 255, 255, 0.1);
            --ff: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--ff);
            /* Naprawa ucinania na iPhone i laptopach */
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .app {
            width: 100%;
            max-width: 450px; /* Szerokość idealna na laptopa i telefon */
            padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-height: 100%;
        }

        /* Dekoracyjne tło */
        .glow {
            position: fixed;
            width: 300px;
            height: 300px;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }
        .glow-1 { background: var(--purple); top: -100px; right: -100px; }
        .glow-2 { background: var(--blue); bottom: -50px; left: -100px; }

        .header { margin-top: 2rem; }
        .wordmark { font-weight: 700; letter-spacing: 2px; font-size: 14px; color: var(--text-dim); text-transform: uppercase; }
        .wordmark span { color: var(--blue); }

        .hero-section { margin-top: 1rem; }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; }
        
        .hero-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 28px;
            font-weight: 700;
            font-family: var(--ff);
            resize: none;
            border-bottom: 2px solid rgba(77, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        /* Lista opcji - teraz się nie ucinają */
        .options-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .opt-row {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.3s ease;
        }

        .opt-row.winner { border-color: var(--green); background: rgba(57, 255, 150, 0.1); }

        .add-box {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-family: var(--ff);
            font-size: 16px; /* Zapobiega zoomowaniu Safari */
            outline: none;
        }

        .add-btn {
            background: var(--blue);
            color: black;
            border: none;
            width: 50px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 20px;
            cursor: pointer;
        }

        .cta-btn {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(90deg, #1a8cff, #7c3fff);
            color: white;
            font-family: var(--ff);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-top: auto;
            margin-bottom: 1rem;
        }

        .cta-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .result-area {
            background: var(--surface2);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 2rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .del-btn { background: none; border: none; color: #ff5555; cursor: pointer; font-size: 16px; padding: 0 5px; }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="app">
        <header class="header">
            <div class="wordmark">sigmowy decyzator 3000<span>.</span></div>
        </header>

        <section class="hero-section">
            <div class="label">Co cie meczy</div>
            <textarea class="hero-input" id="qInput" placeholder="What's the plan?" rows="1"></textarea>
        </section>

        <section class="options-container">
            <div class="label">jakie opcje? <span id="counter" style="color: var(--blue)">0/10</span></div>
            <div id="list"></div>
            
            <div class="add-box">
                <input type="text" class="add-input" id="addInput" placeholder="Add something..." maxlength="40">
                <button class="add-btn" onclick="addItem()">+</button>
            </div>
        </section>

        <button class="cta-btn" id="goBtn" onclick="runDecide()" disabled>ugotuj</button>

        <div class="result-area" id="resCard">
            <div id="resInner">
                <div class="label" style="margin-bottom: 0;">wyniczek</div>
            </div>
        </div>
    </div>

    <script>
        let items = [];

        function addItem() {
            const input = document.getElementById('addInput');
            const val = input.value.trim();
            if(val && items.length < 10) {
                items.push(val);
                input.value = '';
                updateUI();
            }
        }

        function removeItem(index) {
            items.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            const listDiv = document.getElementById('list');
            const counter = document.getElementById('counter');
            const goBtn = document.getElementById('goBtn');

            counter.innerText = `${items.length}/10`;
            goBtn.disabled = items.length < 2;

            listDiv.innerHTML = items.map((item, i) => `
                <div class="opt-row" id="row-${i}">
                    <span>${item}</span>
                    <button class="del-btn" onclick="removeItem(${i})">✕</button>
                </div>
            `).join('');
        }

        function runDecide() {
            const resInner = document.getElementById('resInner');
            resInner.innerHTML = '<div class="label">Thinking...</div>';
            
            // Reset kolorów
            document.querySelectorAll('.opt-row').forEach(r => r.classList.remove('winner'));

            setTimeout(() => {
                const winnerIndex = Math.floor(Math.random() * items.length);
                const winner = items[winnerIndex];
                
                resInner.innerHTML = `
                    <div class="label" style="color: var(--green)">Selected</div>
                    <div style="font-size: 24px; font-weight: 700;">${winner}</div>
                `;

                document.getElementById(`row-${winnerIndex}`).classList.add('winner');
            }, 800);
        }

        // Obsługa Entera
        document.getElementById('addInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') addItem();
        });
    </script>
</body>
</html>
